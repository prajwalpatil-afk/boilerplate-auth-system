spring:
  application:
    name: com.auth-system

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/auth-app
    username: postgres
    password: root

    hikari:
      pool-name: HikariCP
      maximum-pool-size: 5
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 100000
      leak-detection-threshold: 0
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8082